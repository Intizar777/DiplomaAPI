version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: dashboard_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dashboard_api
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Dashboard API
  api:
    build: .
    container_name: dashboard_api
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/dashboard_api
      GATEWAY_URL: http://host.docker.internal:3000/api
      GATEWAY_AUTH_EMAIL: ${GATEWAY_AUTH_EMAIL:-admin@efko.local}
      GATEWAY_AUTH_PASSWORD: ${GATEWAY_AUTH_PASSWORD:-Efko2024!}
      GATEWAY_TIMEOUT_CONNECT: "10.0"
      GATEWAY_TIMEOUT_READ: "30.0"
      GATEWAY_MAX_RETRIES: "3"
      APP_NAME: Dashboard Analytics API
      APP_VERSION: 1.0.0
      DEBUG: "false"
      SYNC_INTERVAL_MINUTES: "60"
      RETENTION_DAYS: "90"
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: >
      sh -c "
        sleep 5 &&
        alembic upgrade head &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000
      "

volumes:
  postgres_data:
